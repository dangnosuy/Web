<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Text To Speech | AlchemistAI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="texttospeech.css" />
  </head>
  <body>
    <header>
      <button class="menu-toggle">
        <i class="fas fa-bars"></i>
      </button>
      <div class="logo">
        <img style="border: 2px solid #3b82f6 ;" class="w-16 h-16 rounded-full object-cover" src="img_source/logo.png"
        alt="Logo"
        />
        <span class="logo_text" style="background: linear-gradient(90deg, #00c6ff, #7d51f1, #a855f7);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;" class="text-xl font-bold">
        AlchemistAI</span>
      </div>
      <nav class="menu">
        <a href="index.html" class="text-white no-underline font-extrabold hover:text-green-300 pb-1 text-lg">Home</a>
        <a href="#" class="text-blue-600 font-extrabold border-b-2 border-blue-600 pb-1 hover:text-blue-700 text-lg">Text to Speech</a>
        <a href="texttoimage.html" class="text-white no-underline font-extrabold hover:text-green-300 pb-1 text-lg">Text to Image</a>
        <a href="texttomusic.html" class="text-white no-underline font-extrabold  hover:text-green-300 pb-1 text-lg">Text to Music</a>
      </nav>
      <div class="avatar-container">
        <img src="img_source/ho.jpg" alt="User Avatar" class="avatar" id="avatarImg">
        <!-- Dropdown Menu -->
        <div class="dropdown-menu" id="dropdownMenu">
          <a href="profile.html" class="dropdown-menu-item">
            <i class="fas fa-user"></i>
            <span>Profile</span>
          </a>
          <div class="dropdown-divider"></div>
          <a href="settings.html" class="dropdown-menu-item">
            <i class="fas fa-cog"></i>
            <span>Settings</span>
          </a>
          <div class="dropdown-divider"></div>
          <a href="Sign_in.html" class="dropdown-menu-item logout">
            <i class="fas fa-sign-out-alt"></i>
            <span>Đăng xuất</span>
          </a>
        </div>
      </div>
    </div>
    </header>
    
    <main style="background: #0a0425 url('https://img.freepik.com/free-vector/colorful-wavy-background_23-2148494696.jpg?t=st=1744525839~exp=1744529439~hmac=79f342806727a0519b017c97358513949e42e72532324180342328c049d7ac9c&w=2000') no-repeat center center fixed;
       background-size: cover;">
       <!-- phần giới thiệu trang -->
       <h1 class="text-3xl sm:text-4xl md:text-5xl font-bold mb-4">Text To Speech</h1>
       <div class="text mb-4">
        Bring your words to life with voice. Enter your text, choose a voice, and let AI turn it into natural speech
       </div>
      <!-- Main Workspace -->
      <div class="workspace">
        <div class="text-input-container hover:transform hover:scale-[1.02] transition-all duration-300">
          <div class="tab-buttons">
            <button class="tab-button active" data-tab="text-panel">Text Input</button>
            <button class="tab-button" data-tab="file-panel">File Input</button>
          </div>
          <div class="tab-content">
            <div id="text-panel" class="tab-panel active">
              <textarea id="textInput" placeholder="Enter text to convert to speech"></textarea>
            </div>
      
            <div id="file-panel" class="tab-panel" style="display: none;">
               <label for="file-upload" class="custom-file-upload">
                   <i class="fas fa-cloud-upload-alt"></i> Click or Drag & Drop File
               </label>
               <input id="file-upload" type="file" style="display: none;"/>
               <p class="file-info">Accepts: .txt, .pdf, .docx</p>
            </div>
          </div>
          
          <div class="controls">
            <div class="params">
              <select id="language" name="language" class="p-2 sm:p-2 text-sm sm:text-base border rounded-lg bg-white/5 text-gray-100 hover:bg-white/10 transition-all duration-300 cursor-pointer hover:border-blue-500">
              <option value="vi" selected class="bg-[#0f0149] text-white">Tiếng Việt</option>
              <option value="en" class="bg-[#374151] text-white">English (US)</option>
              <option value="en-kd" class="bg-[#374151] text-white">English (UK)</option>
              <option value="pt" class="bg-[#374151] text-white">Brazil</option>
              <option value="ko" class="bg-[#374151] text-white">Korea</option>
              <option value="zh" class="bg-[#374151] text-white">China</option>
              <option value="ja" class="bg-[#374151] text-white">Japan</option>
              <option value="it" class="bg-[#374151] text-white">Italy</option>
              <option value="es" class="bg-[#374151] text-white">Spain</option>
              <option value="fr" class="bg-[#374151] text-white">France</option>
            </select>
        
              <select id="gender" name="voice" class="p-2 border rounded-lg bg-white/5 text-gray-100 hover:bg-white/10 transition-all duration-300 cursor-pointer hover:border-blue-500">
                <option value="male" selected class="bg-[#374151] text-white">Male voice</option>
                <option value="female" class="bg-[#374151] text-white">Female voice</option>
              </select>
            </div>
            <div class="actions">
              <button id="generateBtn" class="bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600 transform hover:scale-105 transition-all duration-300 hover:shadow-lg hover:shadow-blue-500/30">Generate</button>
              <button id="clearBtn" class="bg-red-500 text-white px-4 py-2 rounded-lg hover:bg-red-600 transform hover:scale-105 transition-all duration-300 hover:shadow-lg hover:shadow-red-500/30" >Clear</button>
            </div>
          </div>
        </div>
        <div class="output-container hover:transform hover:scale-[1.02] transition-all duration-300">
          <label for="Recordings" class="tilte">Your generated audio</label>
            <div class="recording-item">
              <audio id="audio-player" controls src="">
                <source src="" type="audio/mpeg" />
                Your browser does not support the audio element.
              </audio>
            </div>
        </div>
      </div>
      <div class="extension">
          <!-- Chat History Sidebar -->
       <div class="chat-history hover:transform hover:scale-[1.02] transition-all duration-300">
      <h3 class="history-title">History</h3>
    </div>
    </div>
    </main>
    
    <script>
     document.getElementById("clearBtn").addEventListener('click', function() {
    document.getElementById('textInput').value = '';
  });
  // API call to convert text to speech
  document
    .getElementById("generateBtn")
    .addEventListener("click", sendText);

  async function sendText() {
    // test username
    
    const username = localStorage.getItem('username');
    // lấy dữ liệu từ form
    const text = document.getElementById("textInput").value;
    const language = document.getElementById("language").value;
    const gender = document.getElementById("gender").value;
    const data = { username, text, language, gender };

    if (text.trim() === "") {
      alert("Vui lòng nhập text");
      return;
    }
    // Lấy audio element
    const audioElement = document.getElementById("audio-player");

    // Ẩn audio cũ và clear src trước khi gửi
    audioElement.style.display = "none";
    audioElement.pause(); // dừng phát nếu đang phát
    audioElement.src = "";
    
    try {
      const response = await fetch("http://127.0.0.1:5552/api/tts", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data),
      });

      if (!response.ok) throw new Error("TTS request failed");
      const newItem = await response.json();
      audioElement.src = newItem.result;
      audioElement.style.display = "block"; // hiện audio
      audioElement.load();
      audioElement.play();
       // Thêm vào history containter
      addToHistory(newItem);
      
    } catch (err) {
      //alert("Error: " + err.message);
      console.log("Error", err)
    }
  };


  // Hàm tính giờ so với hiện tại
  function getTimeAgo(timestamp) {
    const now = Date.now();
    const diff = now - timestamp;
    const minutes = Math.floor(diff / 60000);
    const hours = Math.floor(diff / 3600000);

     if (diff < 60000) return "Vừa xong";
     if (diff < 3600000) return `${minutes} phút trước`;
     if (diff < 86400000) return `${hours} giờ trước`;
      return `${Math.floor(diff / 86400000)} ngày trước`;
  };


  // Hàm tạo history-item
  function createHistoryItem(item) {
    const div = document.createElement("div");
    div.className = "history-item";

    const previewText =
    item.input_text.length > 30 ? item.input_text.slice(0, 30) + "..." : item.input_text;

    //Lấy timestamp (tức giờ generate gốc) để làm mốc xác định dùng để cập nhật realtime
    const timestamp = item.timestamp; 
    //Gọi hàm trả về giờ so với hiện tại
    const timeAgoText = getTimeAgo(timestamp);

    div.innerHTML = `
        <p title="${item.input_text}">${previewText}</p>
        <small class="time-text" data-timestamp="${timestamp}">${timeAgoText}</small>
        ${
            item.result
                ? `
                    <div class="audio-history-container">
                        <audio controls src="${item.result}"></audio>
                        <div class="audio-controls">
                            <a href="${item.result}" download class="audio-control-btn">
                                <i class="fas fa-download" title="Download"></i>
                            </a>
                            <button class="audio-control-btn delete-btn">
                                <i class="fas fa-trash" title="Delete"></i>
                            </button>
                        </div>
                    </div>
                `
                : ""
        }
    `;
    return div;
  };

  // Load history
  async function loadHistory(username) { 
    try {
      const response = await fetch(
        `http://127.0.0.1:5552/api/history_tts?username=${encodeURIComponent(username)}`
      );
      const historyData = await response.json();

      const historyContainer = document.querySelector(".chat-history");

      // Xóa những item cũ (nếu có)
      const oldItems = historyContainer.querySelectorAll(".history-item");
      oldItems.forEach((item) => item.remove());

      // Thêm lịch sử mới
      historyData.forEach((item) => {
        const div = createHistoryItem(item);
        historyContainer.appendChild(div);
      });
    } catch (err) {
      console.error("Lỗi load history:", err);
    }
  }

  // Gọi khi load trang (hoặc khi đăng nhập xong)
  window.addEventListener("DOMContentLoaded", () => {
    const username = localStorage.getItem('username'); // Thay bằng username thật sau khi login
    loadHistory(username);
  });

  // Khi vừa bấm generate nhưng muốn không phải load trang để cập nhật history
  function addToHistory(newItem) {
    const historyContainer = document.querySelector(".chat-history");
    const div = createHistoryItem(newItem);
    historyContainer.insertBefore(div, historyContainer.querySelector(".history-title").nextSibling);
  };

   //Cập nhật thời gian từng history-item theo realtime
   setInterval(() => {
    const timeElements = document.querySelectorAll('.time-text');
    timeElements.forEach(el => {
     const timestamp = Number(el.dataset.timestamp); // chuyển rõ ràng sang số
      if (!isNaN(timestamp)) {
         el.textContent = getTimeAgo(timestamp);
        }
    });
  }, 60000);

 // Avatar dropdown functionality
  const avatarImg = document.getElementById('avatarImg');
  const dropdownMenu = document.getElementById('dropdownMenu');
  
  // Toggle dropdown when avatar is clicked
  avatarImg.addEventListener('click', function(e) {
    e.stopPropagation();
    dropdownMenu.classList.toggle('active');
  });
  
  // Close dropdown when clicking outside
  document.addEventListener('click', function(e) {
    if (!avatarImg.contains(e.target) && !dropdownMenu.contains(e.target)) {
      dropdownMenu.classList.remove('active');
    }
  });
  
  // Add click events for menu items
  document.querySelectorAll('.dropdown-menu-item').forEach(item => {
    item.addEventListener('click', function() {
      const action = this.querySelector('span').textContent;
      alert(`You clicked: ${action}`);
      dropdownMenu.classList.remove('active');
    });
  });

   // Mobile menu toggle
  const menuToggle = document.querySelector('.menu-toggle');
  const menu = document.querySelector('.menu');

  document.addEventListener('click', function(e) {
  
  if (menuToggle.contains(e.target)) {
      menu.classList.toggle('active');
  }
  else if (!menu.contains(e.target)) {
      menu.classList.remove('active');
  }
  });
  document.addEventListener('DOMContentLoaded', function() {
  // Lấy tất cả các nút tab
  const tabButtons = document.querySelectorAll('.tab-button');

  // Lặp qua từng nút tab và thêm sự kiện click
  tabButtons.forEach(button => {
    button.addEventListener('click', () => {
      // Lấy ID của panel mục tiêu từ thuộc tính data-tab của nút được nhấp
      const targetPanelId = button.getAttribute('data-tab');
      const targetPanel = document.getElementById(targetPanelId);

      // Kiểm tra xem panel mục tiêu có tồn tại không
      if (!targetPanel) {
        console.error("Không tìm thấy panel với ID:", targetPanelId);
        return; // Nếu không tìm thấy, dừng thực thi
      }

      // --- Cập nhật trạng thái active cho các nút ---
      // 1. Xóa lớp 'active' khỏi TẤT CẢ các nút tab
      tabButtons.forEach(btn => {
        btn.classList.remove('active');
      });
      // 2. Thêm lớp 'active' vào nút VỪA ĐƯỢC NHẤP
      button.classList.add('active');

      // --- Cập nhật hiển thị cho các panel ---
      // 1. Lấy tất cả các panel (là con trực tiếp của .tab-content và có ID)
      //    Sử dụng class .tab-panel sẽ tốt hơn nếu có
      const allPanels = document.querySelectorAll('.tab-content > .tab-panel'); // Sử dụng class .tab-panel
      // 2. Ẩn TẤT CẢ các panel
      allPanels.forEach(panel => {
        panel.style.display = 'none';
         // Hoặc nếu dùng class: panel.classList.remove('active');
      });
      // 3. Hiển thị panel MỤC TIÊU
      targetPanel.style.display = 'block'; // Hoặc 'flex', 'grid' tùy thuộc vào CSS
      // Hoặc nếu dùng class: targetPanel.classList.add('active');

    });
  });
});
    </script> 
  </body>
</html>
