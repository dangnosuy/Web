<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <title>Text To Image | AlchemistAI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="texttoimage.css" />
</head>

<body>
  <header>
    <button class="menu-toggle">
      <i class="fas fa-bars"></i>
    </button>
    <div class="logo">
      <img style="border: 2px solid #3b82f6 ;" class="w-16 h-16 rounded-full object-cover" src="img_source/logo.png"
      alt="Logo"
      />
      <span class="logo_text" style="background: linear-gradient(90deg, #00c6ff, #7d51f1, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;" class="text-xl font-bold">
      AlchemistAI</span>
    </div>
    <nav class="menu">
      <a href="index.html" class="text-white no-underline font-extrabold hover:text-green-300 pb-1 text-lg">Home</a>
      <a href="texttospeech.html" class="text-white no-underline font-extrabold hover:text-green-300 pb-1 text-lg">Text to Speech</a>
      <a href="#" class="text-blue-600 font-extrabold border-b-2 border-blue-600 pb-1 hover:text-blue-700 text-lg">Text to Image</a>
      <a href="texttomusic.html" class="text-white no-underline font-extrabold  hover:text-green-300 pb-1 text-lg">Text to Music</a>
    </nav>
    <div class="avatar-container">
      <img src="img_source/ho.jpg" alt="User Avatar" class="avatar" id="avatarImg">
      <!-- Dropdown Menu -->
      <div class="dropdown-menu" id="dropdownMenu">
        <a href="profile.html" class="dropdown-menu-item">
          <i class="fas fa-user"></i>
          <span>Profile</span>
        </a>
        <div class="dropdown-divider"></div>
        <a href="settings.html" class="dropdown-menu-item">
          <i class="fas fa-cog"></i>
          <span>Settings</span>
        </a>
        <div class="dropdown-divider"></div>
        <a href="Sign_in.html" class="dropdown-menu-item logout">
          <i class="fas fa-sign-out-alt"></i>
          <span>Đăng xuất</span>
        </a>
      </div>
    </div>
  </div>
  </header>
  
  <main  style="background: #0a0425 url('https://img.freepik.com/free-vector/3d-abstract-background-with-paper-cut-flower-shape_1217-3276.jpg?t=st=1744531950~exp=1744535550~hmac=aa022095eb30c47ed65301885e315e0e9973437e662588f42bafb2ad2158dbd1&w=1480') no-repeat center center fixed;
       background-size: cover;">>
        <!-- phần giới thiệu trang -->
        <h1 class="text-3xl sm:text-4xl md:text-5xl font-bold mb-4">Text To Image</h1>
        <div class="text mb-4">
        Turn your imagination into visuals. Enter your text, choose a style, and let AI create stunning images from your words.
        </div>
     <!-- Main Workspace -->
    <div class="workspace expanded">
      <div class="text-input-container">
        <label for="textInput">Describe the image you want to generate</label>
        <textarea id="textInput" placeholder="Enter detailed description of the image you want to create..."></textarea>
        <div id="errorMessage" class="error-message" style="display:none;">Please, input prompt!</div>
        <div class="controls">
          <div class="params">
            <select id="style" name="style" class="p-2 sm:p-2 text-sm sm:text-base border rounded-lg bg-white/5 text-gray-100 hover:bg-white/10 transition-all duration-300 cursor-pointer hover:border-blue-500">
              <option value="realistic" selected class="bg-[#0f0149] text-white">Realistic</option>
              <option value="anime" class="bg-[#374151] text-white">Anime</option>
              <option value="cartoon" class="bg-[#374151] text-white">Cartoon</option>
              <option value="watercolor" class="bg-[#374151] text-white">Watercolor</option>
              <option value="oil-painting" class="bg-[#374151] text-white">Oil Painting</option>
              <option value="digital-art" class="bg-[#374151] text-white">Digital Art</option>
            </select>
          </div>
          <div class="actions">
            <button id="generate" class="bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600 transform hover:scale-105 transition-all duration-300 hover:shadow-lg hover:shadow-blue-500/30">Generate Images</button>
            <button id="clear" class="bg-red-500 text-white px-4 py-2 rounded-lg hover:bg-red-600 transform hover:scale-105 transition-all duration-300 hover:shadow-lg hover:shadow-red-500/30">Clear</button>
          </div>
        </div>
      </div>
      <div id="spinner" class="spinner" style="display: none;"></div>
      <div class="output-container">
        <label for="gallery" class="title">Generated Images</label>
        <div class="image-gallery" id="gallery">
        </div>
        <button class="download-all bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600 transform hover:scale-105 transition-all duration-300 hover:shadow-lg hover:shadow-blue-500/30" >Download All Images</button>
      </div>
      
    </div>
    
  </main>

  <script>

    document.getElementById('clear').addEventListener('click', function () {
      document.getElementById('textInput').value = '';
    });

    const textInput = document.getElementById('textInput');
    const generateButton = document.getElementById('generate');
    const errorMessage = document.getElementById('errorMessage');
    const spinner = document.getElementById('spinner');

    generateButton.addEventListener('click', function (event) {
      event.preventDefault()
      // Kiểm tra nếu ô input trống
      if (textInput.value.trim() === "") {
        textInput.classList.add('error');
        errorMessage.style.display = 'block';
        // Có thể thông báo cho người dùng nếu muốn
      } else {
        textInput.classList.remove('error');
        errorMessage.style.display = 'none';

        spinner.style.display = 'block';
        // Tiếp tục xử lý phần generate image
        TextToImage();
      }
    });
    textInput.addEventListener('input', function () {
      if (this.value.trim() !== "") {
        this.classList.remove('error');
        errorMessage.style.display = 'none';
      }
    });
    document.addEventListener('DOMContentLoaded', function () {
      getAllImages();
    });

    // Avatar dropdown functionality
  const avatarImg = document.getElementById('avatarImg');
  const dropdownMenu = document.getElementById('dropdownMenu');
  
  // Toggle dropdown when avatar is clicked
  avatarImg.addEventListener('click', function(e) {
    e.stopPropagation();
    dropdownMenu.classList.toggle('active');
  });
  
  // Close dropdown when clicking outside
  document.addEventListener('click', function(e) {
    if (!avatarImg.contains(e.target) && !dropdownMenu.contains(e.target)) {
      dropdownMenu.classList.remove('active');
    }
  });
  
  // Add click events for menu items
  document.querySelectorAll('.dropdown-menu-item').forEach(item => {
    item.addEventListener('click', function() {
      const action = this.querySelector('span').textContent;
      alert(`You clicked: ${action}`);
      dropdownMenu.classList.remove('active');
    });
  });

      // Mobile menu toggle
    const menuToggle = document.querySelector('.menu-toggle');
    const menu = document.querySelector('.menu');

    document.addEventListener('click', function(e) {
    
    if (menuToggle.contains(e.target)) {
        menu.classList.toggle('active');
    }
    else if (!menu.contains(e.target)) {
        menu.classList.remove('active');
    }
    });
  </script>
  <script src="./tti.js"></script>
</body>

</html>
